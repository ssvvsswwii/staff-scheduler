<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Scheduler</title>
  <link rel="stylesheet" href="css/style.css?v=12">
</head>
<body>

  <!-- ── Header ── -->
  <header class="app-header">
    <span class="app-title">📅 Staff Scheduler</span>
    <div class="month-nav">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </div>
    <div class="header-right">
      <button class="hdr-btn" id="settingsBtn" style="display:none" onclick="openSettings()">⚙️</button>
      <button class="hdr-btn" id="saveBtn"     style="display:none" onclick="saveData()">💾 Save</button>
      <button class="hdr-btn" id="lockBtn">🔒 Unlock</button>
    </div>
  </header>

  <!-- ── Branch tabs ── -->
  <div class="branch-bar">
    <div class="branch-tabs" id="branchTabs"></div>
  </div>

  <!-- ── Calendar ── -->
  <main>
    <div class="cal-grid" id="calGrid"></div>
  </main>

  <!-- ── Day modal ── -->
  <div class="overlay hidden" id="dayOverlay">
    <div class="sheet">
      <div class="sheet-header">
        <h2 id="dayTitle">—</h2>
        <button class="close-btn" onclick="closeDay()">✕</button>
      </div>
      <div class="sheet-body" id="dayBody"></div>
    </div>
  </div>

  <!-- ── Auth modal ── -->
  <div class="overlay hidden" id="authOverlay">
    <div class="modal-sm">
      <div class="sheet-header">
        <h2>Unlock Editing</h2>
        <button class="close-btn" onclick="closeModal('authOverlay')">✕</button>
      </div>
      <div style="padding:1.25rem">
        <input type="password" id="pwInput" class="input" placeholder="Enter password"
               onkeydown="if(event.key==='Enter')submitPassword()">
        <p class="pw-error hidden" id="pwError">Incorrect password.</p>
        <button class="btn btn-primary" style="width:100%;margin-top:0.75rem" onclick="submitPassword()">Unlock</button>
      </div>
    </div>
  </div>

  <!-- ── Settings modal ── -->
  <div class="overlay hidden" id="settingsOverlay">
    <div class="modal-lg">
      <div class="sheet-header">
        <h2>⚙️ Settings</h2>
        <button class="close-btn" onclick="closeModal('settingsOverlay')">✕</button>
      </div>
      <div id="settingsBody" style="padding:1.25rem"></div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script src="js/app.js?v=9"></script>
</body>
</html>
