<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Schedule</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="sched-page">

  <div class="sched-hero">
    <h1>My Schedule</h1>
    <p class="period-range" id="periodRange">Loading…</p>
    <div class="search-wrap">
      <input id="searchInput" class="search-input" type="text"
             placeholder="Type your name or staff ID…"
             autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <div class="sched-body">
    <div id="results">
      <p class="no-result"><span class="icon">🔍</span>Type your name above to see your shifts.</p>
    </div>
  </div>

  <script src="js/schedule.js"></script>
</body>
</html>
